<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Button Component</title>
    <script src="/assets/js/components/button.js" type="module"></script>
  </head>
  <body>
    <h1>Reusable Button Component</h1>

    <!-- Use the custom button -->
    <custom-button
      text="Submit"
      variant="primary"
      onClick="handleSubmit"
    ></custom-button>

    <script>
      function handleSubmit() {
        alert("Form Submitted!");
      }
    </script>
  </body>
</html>
